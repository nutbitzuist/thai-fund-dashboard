name: Daily DB Backup

# Runs every day at 14:00 UTC (21:00 Bangkok) — after the 18:30 daily sync
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install pg_dump (PostgreSQL 17)
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Parse connection details from DATABASE_URL
          pg_dump "$DATABASE_URL" \
            --no-owner --no-acl \
            --format=custom \
            --file=backup.dump
          echo "Backup size: $(du -sh backup.dump | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_id }}
          path: backup.dump
          retention-days: 30

      - name: Notify Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SIZE=$(du -sh backup.dump | cut -f1)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT}" \
            -d text="✅ Daily DB backup complete (${SIZE}) — retained 30 days" \
            -d parse_mode="HTML"
